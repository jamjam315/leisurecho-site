<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>レジャー帳 | 公営競技の収支記録アプリ</title>
<style>
  :root {
    --green: #4C9A72;
    --green-dark: #04342C;
    --text: #22302B;
    --text-sub: #5B6B64;
    --bg: #FAFCFB;
    --line: #E2EAE6;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", "Yu Gothic", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.9;
    display: flex;
    min-height: 100vh;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    max-width: 480px;
    text-align: center;
  }
  .logo {
    font-size: 32px;
    font-weight: 700;
    color: var(--green-dark);
  }
  .tagline {
    color: var(--text-sub);
    margin-top: 10px;
    font-size: 15px;
  }
  .status {
    display: inline-block;
    margin-top: 22px;
    padding: 6px 16px;
    border: 1px solid var(--line);
    border-radius: 999px;
    font-size: 13px;
    color: var(--green);
    background: #fff;
  }
  .links {
    margin-top: 36px;
    padding-top: 20px;
    border-top: 1px solid var(--line);
    font-size: 14px;
  }
  a { color: var(--green); }
  footer {
    margin-top: 28px;
    font-size: 12px;
    color: var(--text-sub);
  }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">レジャー帳</div>
    <div class="tagline">競艇・競馬・競輪の収支を、かんたんに記録。</div>
    <div class="status">Google Play にて近日公開予定</div>
    <div class="links">
      <a href="/privacy-policy.html">プライバシーポリシー</a>
    </div>
    <footer>MTP Works — info@leisurecho.com</footer>
  </div>
</body>
</html>
